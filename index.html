<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arva ära kuulsus!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Arva ära kuulsus!</h1>
        <p class="instructions">Kliki ruutudel, et pilt selgemaks teha. Arva ära, kes on pildil!</p>
        
        <div class="game-area">
            <div class="image-container" id="imageContainer">
                <!-- Terav pilt taustal -->
                <img id="celebrityImage" src="" alt="Kuulsus">
                <div class="grid" id="grid"></div>
            </div>
        </div>

        <div class="answer-section">
            <input type="text" id="guessInput" placeholder="Kirjuta nimi siia...">
            <button id="checkBtn">Kontrolli</button>
        </div>

        <p id="feedback"></p>
        <p class="score">Skoor: <span id="score">0</span> / <span id="total">13</span></p>

        <div class="navigation">
            <button id="prevBtn">← Eelmine</button>
            <button id="nextBtn">Järgmine →</button>
        </div>

        <button id="revealBtn" class="reveal-btn">Näita vastust</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
